
[config.wallpaper]
set = true

# The base command to run for applying the wallpaper.
# Keywords like {{ image }} or anything that works inside of hooks works here.
# You could also set a static color if you use the color keywords and the wallpaper setter supports it.
command = "swww"
arguments = ['img', '--transition-type', 'center']

# For example, killing the wallpaper daemon. Usage is like a normal hook.
# pre_hook = "pkill swww"

[templates.hyprland]
input_path = '~/.config/matugen/templates/hyprland-colors.conf'
output_path = '~/.config/hypr/colors.conf'
post_hook = 'hyprctl reload'

[templates.alacritty]
input_path = '~/.config/matugen/templates/alacritty.toml'
output_path = '~/.config/alacritty/colors.toml'

[templates.rofi]
input_path = '~/.config/matugen/templates/rofi-colors.rasi'
output_path = '~/.config/rofi/colors.rasi'

[templates.waybar]
input_path = '~/.config/matugen/templates/colors.css'
output_path = '~/.config/waybar/colors.css'
post_hook = '/home/agnab/.config/waybar/scripts/launch.sh & disown'

[templates.pywalfox]
input_path = '~/.config/matugen/templates/colors.json'
output_path = '~/.cache/wal/colors.json'
post_hook = 'pkill quickshell && quickshell & pywalfox update'

[templates.dunst]
input_path = '~/.config/matugen/templates/dunstrc-colors'
output_path = '~/.config/dunst/dunstrc'
post_hook = 'dunstctl reload'

[templates.gtk4]
input_path = '~/.config/matugen/templates/gtk-colors.css'
output_path = '~/.config/gtk-4.0/colors.css'

[templates.eww]
input_path = "~/.config/matugen/templates/eww.scss"
output_path = "~/.config/eww/colors.scss"

[templates.hyprdecor]
input_path = '~/.config/matugen/templates/colors.json'
output_path = '~/hyprdecor/assets/cat/colors.json'
post_hook = 'exec ~/hyprdecor/assets/cat/matugen-cat.sh'

[templates.vencord]
input_path = '~/.config/matugen/templates/midnight-vencord.css'
output_path = '~/.config/vesktop/themes/colors.css'
