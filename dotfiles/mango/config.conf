# Monitors - Uncomment this and set your monitor if on vm
# Heavily Inspired by Argos Nothing's DWM Re-write + Fun stuff.
# Check his out here: https://github.com/argosnothing/mango-dwm-config/

# Laptop display: 1080p, 60Hz, positioned at origin
monitorrule=name:HDMI-A-2,width:1920,height:1080,refresh:144,x:0,y:0

# waybar & wmenu required.
bind=SUPER,Return,spawn,alacritty
bind=SUPER,d,spawn,rofi -show drun
bind=SUPER,s,spawn,flameshot gui
exec-once=awww-daemon
exec-once=qs -c "/home/agnab/nixos/dotfiles/quickshell/"
exec-once=awww img $HOME/nixos/dotfiles/hidden/"Beach desktop.png"
exec-once=matugen image $HOME/nixos/dotfiles/hidden/"Beach desktop.png" --source-color-index 0
enable_hotarea=0
exec-once=discord --start-minimized & steam -silent &
env=QT_STYLE_OVERRIDE,kvantum
env=QT_QPA_PLATFORMTHEME,kvantum
# bind=SUPER,R,spawn,/home/tony/.config/mango/rebar.sh

bind=SUPER,1,view,1
bind=SUPER,2,view,2
bind=SUPER,3,view,3
bind=SUPER,4,view,4
bind=SUPER,5,view,5
bind=SUPER,6,view,6
bind=SUPER,7,view,7
bind=SUPER,8,view,8
bind=SUPER,9,view,9

bind=SUPER+SHIFT,1,tag,1
bind=SUPER+SHIFT,2,tag,2
bind=SUPER+SHIFT,3,tag,3
bind=SUPER+SHIFT,4,tag,4
bind=SUPER+SHIFT,5,tag,5
bind=SUPER+SHIFT,6,tag,6
bind=SUPER+SHIFT,7,tag,7
bind=SUPER+SHIFT,8,tag,8
bind=SUPER+SHIFT,9,tag,9

#bind=NONE,0,spawn,sudo /usr/local/bin/split.sh
#bind=NONE,E,spawn,openspeedrun-cli split

bind=SUPER,q,killclient
bind=SUPER+SHIFT,r,reload_config

bind=NONE,XF86MonBrightnessUp,spawn,brightnessctl s +10%
bind=SHIFT,XF86MonBrightnessUp,spawn,brightnessctl s 100%
bind=NONE,XF86MonBrightnessDown,spawn,brightnessctl s 10%-
bind=SHIFT,XF86MonBrightnessDown,spawn,brightnessctl s 1%

bind=NONE,XF86AudioRaiseVolume,spawn,wpctl set-volume @DEFAULT_SINK@ 5%+
bind=NONE,XF86AudioLowerVolume,spawn,wpctl set-volume @DEFAULT_SINK@ 5%-
bind=NONE,XF86AudioMute,spawn,wpctl set-mute @DEFAULT_SINK@ toggle
bind=SHIFT,XF86AudioMute,spawn,wpctl set-mute @DEFAULT_SOURCE@ toggle

# Layouts
bind=SUPER,t,setlayout,tile
bind=SUPER+SHIFT,t,setlayout,tgmix

# Layouts in mango are per tag. So we'll set all tags to tile by default. 
tagrule=id:1,layout_name:tile
tagrule=id:2,layout_name:tgmix
tagrule=id:3,layout_name:tgmix
tagrule=id:4,layout_name:tgmix
tagrule=id:5,layout_name:tgmix
tagrule=id:6,layout_name:tgmix
tagrule=id:7,layout_name:tgmix
tagrule=id:8,layout_name:tgmix
tagrule=id:9,layout_name:tgmix


animations=1
gappih=5
gappiv=5
gappoh=5
gappov=5
borderpx=4
no_border_when_single=0
focuscolor=0x669264ff

# Mouse Button Bindings
mousebind=SUPER,btn_left,moveresize,curmove
mousebind=SUPER,btn_right,moveresize,curresize
drag_tile_to_tile=1
enable_hotarea=0

#fix electron tearing
syncobj_enable=1

# options
repeat_rate=35
repeat_delay=200

# Effect
blur=0
blur_layer=1
blur_optimized=1
blur_params_num_passes = 2
blur_params_radius = 5
blur_params_noise = 0.02
blur_params_brightness = 0.9
blur_params_contrast = 0.9
blur_params_saturation = 1.2

shadows = 1
layer_shadows = 1
shadow_only_floating=1
shadows_size = 12
shadows_blur = 15
shadows_position_x = 0
shadows_position_y = 0
shadowscolor= 0x000000ff

# Animation Configuration
animations=1
layer_animations=1
animation_type_open=zoom
animation_type_close=slide 
layer_animation_type_open=slide
layer_animation_type_close=slide 
animation_fade_in=1
animation_fade_out=1
tag_animation_direction=1
zoom_initial_ratio=0.3
zoom_end_ratio=0.7
fadein_begin_opacity=0.6
fadeout_begin_opacity=0.8
animation_duration_move=500
animation_duration_open=400
animation_duration_tag=350
animation_duration_close=800
animation_curve_open=0.46,1.0,0.29,1.1
animation_curve_move=0.46,1.0,0.29,1
animation_curve_tag=0.46,1.0,0.29,1
animation_curve_close=0.08,0.92,0,1

# Scroller Layout Setting
scroller_structs=20
scroller_default_proportion=0.8
scroller_focus_center=0
scroller_prefer_center=1
edge_scroller_pointer_focus=1
scroller_default_proportion_single=1.0
scroller_proportion_preset=0.5,0.8,1.0

bind=SUPER+SHIFT,f,togglefullscreen,
bind=SUPER,f,togglefloating,

# smartmovewin
bind=CTRL+SHIFT,k,smartmovewin,up
bind=CTRL+SHIFT,j,smartmovewin,down
bind=CTRL+SHIFT,h,smartmovewin,left
bind=CTRL+SHIFT,l,smartmovewin,right

# switch window focus
bind=SUPER,j,focusstack,next
bind=SUPER,k,focusstack,prev
bind=SUPER,h,focusdir,left
bind=SUPER,l,focusdir,right

# swap window
bind=SUPER+SHIFT,k,exchange_client,up
bind=SUPER+SHIFT,j,exchange_client,down
bind=SUPER+SHIFT,h,exchange_client,left
bind=SUPER+SHIFT,l,exchange_client,right